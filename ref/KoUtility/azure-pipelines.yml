# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  - master

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "20.x"
    displayName: "Install Node.js"

  - task: npmAuthenticate@0
    inputs:
      workingFile: ".npmrc"

  - script: npm ci
    displayName: "Install dependencies"

  - script: npm run build
    displayName: "Build project"

  - bash: |
      set -e
      pkg_name=$(node -p "require('./package.json').name")
      current_version=$(node -p "require('./package.json').version")

      echo "Current version: $current_version"

      published_version=$(npm view "$pkg_name" version || echo "0.0.0")

      echo "Published version: $published_version"

      if [ "$current_version" = "$published_version" ]; then
        echo "Version already published, skipping."
        echo "##vso[task.setvariable variable=shouldPublish]false"
      else
        echo "Version is new, publishing..."
        echo "##vso[task.setvariable variable=shouldPublish]true"
      fi
    displayName: "Check if version is already published"

  # ✅ Conditionally publish to private registry
  - script: npm publish
    condition: eq(variables['shouldPublish'], 'true')
    displayName: "Publish to private NPM feed"
